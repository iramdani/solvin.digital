<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Link - Solvin Digital</title>
    
    <!-- Config & Theme -->
    <script src="config.js?v=2026_1"></script>
    <script src="theme.js"></script>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        if (window.tailwindConfig) {
            tailwind.config = window.tailwindConfig;
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { @apply bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-slate-200/50 dark:border-slate-800/50 shadow-soft; }
        .bio-btn { @apply w-full p-4 rounded-2xl glass-card flex items-center gap-4 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] text-left; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen flex justify-center p-4 md:p-10 relative overflow-x-hidden">

    <!-- Decorative Elements -->
    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] -z-10"></div>

    <main class="w-full max-w-md space-y-10 animate-fade-in">
        
        <!-- Profile Section -->
        <div class="text-center space-y-6 pt-8">
            <div class="relative inline-block">
                <div class="absolute -inset-2 bg-gradient-to-tr from-primary to-primary/20 rounded-[2.5rem] blur-xl opacity-20 animate-pulse"></div>
                <div class="relative w-32 h-32 rounded-[2.5rem] p-1 border-2 border-primary/20 bg-white dark:bg-darkCard overflow-hidden shadow-2xl">
                    <img id="profile-img" src="https://ui-avatars.com/api/?name=User&background=fd9c99&color=fff" class="w-full h-full rounded-[2.2rem] object-cover" alt="Profile">
                </div>
            </div>
            
            <div class="space-y-2">
                <h1 id="profile-name" class="text-2xl font-black tracking-tight text-slate-900 dark:text-white">Memuat...</h1>
                <p id="profile-bio" class="text-sm text-slate-500 dark:text-slate-400 font-medium leading-relaxed max-w-[280px] mx-auto">...</p>
            </div>

            <!-- Social Links -->
            <div id="social-icons" class="flex items-center justify-center gap-4">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- Links Section -->
        <div class="space-y-4">
            <div class="flex items-center gap-3 px-2 mb-2">
                <div class="w-8 h-[1px] bg-slate-200 dark:bg-slate-800"></div>
                <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em]">Featured Products</span>
                <div class="flex-1 h-[1px] bg-slate-200 dark:bg-slate-800"></div>
            </div>

            <div id="content-area" class="space-y-4">
                <!-- Skeleton -->
                <div class="h-20 w-full glass-card rounded-2xl animate-pulse"></div>
                <div class="h-20 w-full glass-card rounded-2xl animate-pulse"></div>
                <div class="h-20 w-full glass-card rounded-2xl animate-pulse"></div>
            </div>
        </div>

        <!-- Branding -->
        <footer class="text-center pt-10 pb-20">
            <p class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.3em]">
                Created with <i data-lucide="heart" class="w-3 h-3 inline text-primary fill-primary mx-1"></i> by <span id="footer-brand" class="text-slate-900 dark:text-white">Solvin Digital</span>
            </p>
        </footer>

    </main>

    <script>
        lucide.createIcons();

        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('u');
        const CACHE_SETTINGS = 'cepat_global_settings';

        async function init() {
            if (userId) {
                await loadUserBio();
            } else {
                await loadGlobalSettings();
            }
            loadProducts();
        }

        async function loadUserBio() {
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'get_bio_link', user_id: userId })
                });
                const r = await res.json();
                if (r.status === 'success' && r.data) {
                    renderUserProfile(r.data);
                }
            } catch (e) { console.error(e); }
        }

        async function loadGlobalSettings() {
            const cached = localStorage.getItem(CACHE_SETTINGS);
            if (cached) {
                const c = JSON.parse(cached);
                renderGlobalProfile(c.data);
            }
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'get_global_settings' }) });
                const d = await res.json();
                if (d.status === 'success') {
                    renderGlobalProfile(d.data);
                }
            } catch (e) { console.error(e); }
        }

        function renderUserProfile(data) {
            document.title = `${data.display_name || 'Bio'} - Solvin Digital`;
            document.getElementById('profile-name').innerText = data.display_name || 'Member';
            document.getElementById('profile-bio').innerText = data.bio || 'Digital Creator Success Story';
            document.getElementById('profile-img').src = data.photo_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.display_name)}&background=fd9c99&color=fff&bold=true`;
            renderSocials(data.wa, data.email, data.socials_json);
        }

        function renderGlobalProfile(data) {
            document.title = data.site_name || 'Solvin Digital';
            document.getElementById('profile-name').innerText = data.site_name || 'Solvin Digital';
            document.getElementById('profile-bio').innerText = data.site_tagline || 'Solusi Bisnis Produk Digital';
            document.getElementById('profile-img').src = data.site_logo || `https://ui-avatars.com/api/?name=Solvin&background=fd9c99&color=fff&bold=true`;
            renderSocials(data.wa_admin, data.contact_email, null);
        }

        function renderSocials(wa, email, socialsJson) {
            const container = document.getElementById('social-icons');
            container.innerHTML = '';
            
            const addIcon = (icon, link) => {
                if(!link) return;
                container.innerHTML += `
                    <a href="${link}" target="_blank" class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-primary hover:border-primary transition-all shadow-sm">
                        <i data-lucide="${icon}" class="w-5 h-5"></i>
                    </a>`;
            };

            if(wa) addIcon('message-circle', `https://wa.me/${wa.replace(/[^0-9]/g, '')}`);
            if(email) addIcon('mail', `mailto:${email}`);
            
            if(socialsJson) {
                try {
                    const s = JSON.parse(socialsJson);
                    if(s.fb) addIcon('facebook', s.fb);
                    if(s.ig) addIcon('instagram', s.ig);
                    if(s.twitter) addIcon('twitter', s.twitter);
                    if(s.tiktok) addIcon('music', s.tiktok);
                } catch(e) {}
            }
            lucide.createIcons();
        }

        async function loadProducts() {
            try {
                const res = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'get_products', target_user_id: userId }) 
                });
                const d = await res.json();
                if (d.status === 'success') {
                    renderProductList(d.available || []);
                }
            } catch (e) { console.error(e); }
        }

        function renderProductList(products) {
            const container = document.getElementById('content-area');
            container.innerHTML = products.length ? products.map(p => `
                <a href="checkout.html?id=${p.id}${userId ? '&ref='+userId : ''}" class="bio-btn group">
                    <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary shrink-0">
                        <i data-lucide="package" class="w-6 h-6"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-bold text-slate-900 dark:text-white truncate">${p.title}</h3>
                        <p class="text-[10px] text-slate-500 dark:text-slate-400 font-medium truncate">${p.desc || 'Klik untuk detail produk'}</p>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300 group-hover:text-primary transition-colors"></i>
                </a>
            `).join('') : '<p class="text-center text-slate-400 text-xs py-10">Belum ada produk unggulan.</p>';
            lucide.createIcons();
        }

        init();
    </script>
</body>
</html>
