<!DOCTYPE html>
<html lang="id" class="transition-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Link - Solvin Digital</title>
    
    <!-- Config & Theme -->
    <script src="config.js?v=2026_1"></script>
    <script src="theme.js"></script>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        if (window.tailwindConfig) {
            tailwind.config = window.tailwindConfig;
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-btn {
            @apply glass p-4 rounded-2xl flex items-center gap-4 transition-all duration-300 hover:scale-[1.02] hover:bg-white/50 dark:hover:bg-slate-800/50 border-white/20;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen antialiased flex flex-col items-center p-6">

    <div class="w-full max-w-md space-y-10 py-12">
        
        <!-- Profile Section -->
        <div class="text-center space-y-6 animate-fade-in">
            <div class="relative inline-block group">
                <div class="absolute -inset-1 bg-gradient-to-r from-primary to-rose-400 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
                <img id="profile-img" src="https://ui-avatars.com/api/?name=User&background=ff7375&color=fff" 
                     class="relative w-28 h-28 rounded-full object-cover border-4 border-white dark:border-slate-800 shadow-2xl transition-transform duration-500 group-hover:scale-105">
            </div>
            
            <div class="space-y-2">
                <h1 id="profile-name" class="text-2xl font-black tracking-tight">Memuat Profil...</h1>
                <p id="profile-bio" class="text-sm text-slate-500 dark:text-slate-400 font-medium max-w-xs mx-auto">...</p>
            </div>

            <!-- Social Links -->
            <div id="social-icons" class="flex justify-center gap-4">
                <!-- Injected -->
            </div>
        </div>

        <!-- Links Area -->
        <div id="content-area" class="space-y-4 animate-fade-in" style="animation-delay: 0.2s">
            <!-- Skeleton -->
            <div class="space-y-4">
                <div class="h-16 glass rounded-2xl animate-pulse"></div>
                <div class="h-16 glass rounded-2xl animate-pulse"></div>
                <div class="h-16 glass rounded-2xl animate-pulse"></div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center pt-10">
            <div class="inline-flex items-center gap-2 px-4 py-2 glass rounded-xl border-white/20">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Powered by</span>
                <span class="text-[10px] font-black text-primary uppercase tracking-widest dyn-site-name">Solvin Digital</span>
            </div>
        </footer>

    </div>

    <script>
        lucide.createIcons();

        const urlParams = new URLSearchParams(window.location.search);
        let userId = urlParams.get('u');
        const refId = userId || urlParams.get('ref') || urlParams.get('aff_id');
        
        const CACHE_SETTINGS = 'solvin_global_settings';
        const CACHE_PRODUCTS = 'solvin_public_products';
        
        async function init() {
            if (userId) {
                await loadUserBio();
            } else {
                await loadGlobalSettings();
            }
            loadProducts();
        }

        async function loadUserBio() {
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'get_bio_link', user_id: userId })
                });
                const r = await res.json();
                
                if (r.status === 'success' && r.data) {
                    renderUserProfile(r.data);
                } else {
                    loadGlobalSettings();
                }
            } catch (e) { loadGlobalSettings(); }
        }

        async function loadGlobalSettings() {
            const cached = localStorage.getItem(CACHE_SETTINGS);
            if (cached) {
                renderGlobalProfile(JSON.parse(cached).data);
            }
            
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'get_global_settings' }) });
                const d = await res.json();
                if (d.status === 'success') {
                    localStorage.setItem(CACHE_SETTINGS, JSON.stringify({ data: d.data, time: Date.now() }));
                    renderGlobalProfile(d.data);
                }
            } catch (e) {}
        }

        function renderUserProfile(data) {
            document.title = `${data.display_name} - Solvin Digital`;
            document.getElementById('profile-name').innerText = data.display_name || 'Member';
            document.getElementById('profile-bio').innerText = data.bio || 'Selamat datang di halaman bio saya.';
            
            if (data.photo_url) {
                document.getElementById('profile-img').src = data.photo_url;
            } else {
                document.getElementById('profile-img').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.display_name)}&background=ff7375&color=fff&size=128&bold=true`;
            }

            renderSocials(data.wa, data.email, data.socials);
        }

        function renderGlobalProfile(data) {
            document.title = `${data.site_name} - Official Link`;
            document.getElementById('profile-name').innerText = data.site_name || 'Admin';
            document.getElementById('profile-bio').innerText = data.site_tagline || 'Solusi Bisnis Produk Digital Terpercaya.';
            
            if (data.site_logo) {
                document.getElementById('profile-img').src = data.site_logo;
            }
            
            renderSocials(data.wa_admin, data.contact_email, null);
        }

        function renderSocials(wa, email, socialsJson) {
            const container = document.getElementById('social-icons');
            container.innerHTML = '';
            
            if (wa) {
                const num = String(wa).replace(/[^0-9]/g, '');
                const link = `https://wa.me/${num.startsWith('0') ? '62'+num.slice(1) : num}`;
                container.innerHTML += `<a href="${link}" target="_blank" class="p-3 glass rounded-2xl text-emerald-500 hover:scale-110 transition-transform shadow-sm"><i data-lucide="message-circle" class="w-6 h-6"></i></a>`;
            }
            
            if (email) {
                container.innerHTML += `<a href="mailto:${email}" target="_blank" class="p-3 glass rounded-2xl text-primary hover:scale-110 transition-transform shadow-sm"><i data-lucide="mail" class="w-6 h-6"></i></a>`;
            }

            if (socialsJson) {
                let s = {};
                try { s = typeof socialsJson === 'string' ? JSON.parse(socialsJson) : socialsJson; } catch(e){}
                if (s.ig) container.innerHTML += `<a href="${s.ig}" target="_blank" class="p-3 glass rounded-2xl text-rose-500 hover:scale-110 transition-transform shadow-sm"><i data-lucide="instagram" class="w-6 h-6"></i></a>`;
                if (s.fb) container.innerHTML += `<a href="${s.fb}" target="_blank" class="p-3 glass rounded-2xl text-blue-600 hover:scale-110 transition-transform shadow-sm"><i data-lucide="facebook" class="w-6 h-6"></i></a>`;
            }
            
            lucide.createIcons();
        }

        async function loadProducts() {
            try {
                const res = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'get_products', target_user_id: userId }) 
                });
                const d = await res.json();
                if (d.status === 'success') {
                    renderProductList(d.available || []);
                }
            } catch (e) {}
        }

        function renderProductList(products) {
            const container = document.getElementById('content-area');
            if (!products || products.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 font-bold italic py-10">Belum ada produk tersedia.</p>`;
                return;
            }

            container.innerHTML = products.map(p => {
                let link = p.lp_url || `checkout.html?id=${p.id}`;
                if (refId) {
                    const sep = link.includes('?') ? '&' : '?';
                    link = link.includes('ref=') ? link : `${link}${sep}ref=${refId}`;
                }

                return `
                <a href="${link}" class="glass-btn group">
                    <div class="w-12 h-12 rounded-xl bg-primary/10 text-primary flex items-center justify-center shrink-0 overflow-hidden">
                        ${p.image_url ? `<img src="${p.image_url}" class="w-full h-full object-cover">` : `<i data-lucide="shopping-bag" class="w-5 h-5"></i>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-black text-sm text-slate-900 dark:text-white truncate group-hover:text-primary transition-colors">${p.title}</h3>
                        <p class="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest truncate mt-0.5">${p.desc || 'Lihat Detail Produk'}</p>
                    </div>
                    <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300 group-hover:text-primary group-hover:translate-x-1 transition-all"></i>
                </a>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
