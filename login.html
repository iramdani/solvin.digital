<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Member - Solvin Digital</title>
    
    <!-- Config & Theme -->
    <script src="config.js?v=2026_1"></script>
    <script src="theme.js"></script>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        // Apply Tailwind Config from theme.js
        if (window.tailwindConfig) {
            tailwind.config = window.tailwindConfig;
        }

        // Redirect if already logged in
        if(sessionStorage.getItem('user_email')) window.location.href = 'dashboard.html';

        // Global Settings Injection (Legacy Support)
        (function() {
            const CACHE_KEY = 'cepat_global_settings';
            window.applyGlobalSettings = function(data) {
                if(data.site_favicon) {
                    let link = document.querySelector("link[rel~='icon']");
                    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
                    link.href = data.site_favicon;
                }
                if(data.site_name) {
                    document.title = `Login Member - ${data.site_name}`;
                    document.querySelectorAll('.dyn-site-name').forEach(el => { el.innerText = data.site_name; });
                }
                if(data.site_logo) {
                    const img = document.getElementById('dyn-site-logo');
                    if (img) { img.src = data.site_logo; img.classList.remove('hidden'); }
                    const fb = document.getElementById('logo-fallback');
                    if (fb) fb.classList.add('hidden');
                }
            }
            const cachedStr = localStorage.getItem(CACHE_KEY);
            try { 
                const cached = JSON.parse(cachedStr); 
                if (cached && cached.data) applyGlobalSettings(cached.data);
            } catch(e){}
        })();
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-grid { background-image: radial-gradient(circle at 1px 1px, rgba(253, 156, 153, 0.1) 1px, transparent 0); background-size: 32px 32px; }
        .glass-card { @apply bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-slate-200/50 dark:border-slate-800/50 shadow-soft; }
        
        #toast-container { position: fixed; bottom: 32px; right: 32px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { @apply flex items-center gap-3 px-6 py-4 rounded-2xl font-bold text-sm text-white shadow-2xl transition-all duration-300 translate-y-8 opacity-0; }
        .toast.show { @apply translate-y-0 opacity-100; }
        .toast.success { @apply bg-emerald-500; }
        .toast.error { @apply bg-red-500; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-6 relative overflow-hidden bg-grid">

    <div id="toast-container"></div>

    <!-- Decorative Elements -->
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] -mr-48 -mt-48 animate-pulse"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] -ml-48 -mb-48 animate-pulse" style="animation-delay: 2s"></div>

    <main class="w-full max-w-lg relative z-10">
        <!-- Brand -->
        <div class="mb-10 text-center">
            <div class="inline-flex items-center gap-3 mb-4">
                <div id="logo-fallback" class="w-12 h-12 bg-primary rounded-2xl flex items-center justify-center text-white shadow-lg shadow-primary/20 rotate-3">
                    <i data-lucide="zap" class="w-6 h-6 fill-current"></i>
                </div>
                <img id="dyn-site-logo" src="" alt="Logo" class="h-10 w-auto hidden">
                <span class="text-2xl font-black tracking-tight dyn-site-name">Solvin Digital</span>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white">Selamat Datang Kembali!</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2 font-medium">Silakan masuk untuk mengakses dashboard member.</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-[2.5rem] p-8 md:p-10">
            <form id="form-login" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1">Alamat Email</label>
                    <div class="relative group">
                        <i data-lucide="mail" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors"></i>
                        <input type="email" id="email" class="w-full pl-12 pr-4 py-4 bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all font-semibold" placeholder="nama@email.com" required>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex items-center justify-between px-1">
                        <label class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Password</label>
                        <button type="button" onclick="document.getElementById('modal-forgot').classList.remove('hidden')" class="text-[10px] font-bold text-primary hover:opacity-80 uppercase tracking-widest transition-opacity">Lupa Password?</button>
                    </div>
                    <div class="relative group">
                        <i data-lucide="lock" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors"></i>
                        <input type="password" id="pass" class="w-full pl-12 pr-12 py-4 bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all font-semibold" placeholder="••••••••" required>
                        <button type="button" id="toggle-pass" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 p-2 transition-colors">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="btn-login" class="w-full bg-primary hover:bg-primary/90 text-white py-4 rounded-2xl font-bold text-sm uppercase tracking-widest shadow-xl shadow-primary/20 transition-all flex items-center justify-center gap-3 transform active:scale-[0.98]">
                    Masuk Sekarang
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100 dark:border-slate-800 text-center">
                <a href="index.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-primary text-xs font-bold transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali ke Beranda
                </a>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center mt-10 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">
            &copy; 2026 <span class="dyn-site-name">Solvin Digital</span>. All Rights Reserved.
        </p>
    </main>

    <!-- Forgot Password Modal -->
    <div id="modal-forgot" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden p-6">
        <div class="glass-card w-full max-w-md rounded-[2.5rem] p-8 relative animate-fade-in shadow-2xl">
            <button onclick="document.getElementById('modal-forgot').classList.add('hidden')" class="absolute top-6 right-6 text-slate-400 hover:text-primary transition-colors">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            
            <div class="mb-6">
                <h3 class="text-xl font-extrabold text-slate-900 dark:text-white mb-2">Lupa Password?</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400 font-medium leading-relaxed">Jangan khawatir! Masukkan email Anda dan kami akan mengirimkan detail login Anda.</p>
            </div>
            
            <form id="form-forgot" class="space-y-4">
                <div class="relative group">
                    <i data-lucide="mail" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors"></i>
                    <input type="email" id="email-forgot" class="w-full pl-12 pr-4 py-4 bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all font-semibold" placeholder="nama@email.com" required>
                </div>
                
                <button type="submit" id="btn-forgot" class="w-full bg-slate-900 dark:bg-primary text-white py-4 rounded-2xl font-bold text-sm uppercase tracking-widest transition-all flex items-center justify-center gap-2">
                    Kirim Instruksi
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i> <span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons({ root: toast });
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // Toggle Password Visibility
        const toggleBtn = document.getElementById('toggle-pass');
        if(toggleBtn){
            toggleBtn.addEventListener('click', ()=>{
                const input = document.getElementById('pass');
                const isPw = input.getAttribute('type') === 'password';
                input.setAttribute('type', isPw ? 'text' : 'password');
                toggleBtn.innerHTML = isPw ? '<i data-lucide="eye-off" class="w-5 h-5"></i>' : '<i data-lucide="eye" class="w-5 h-5"></i>';
                lucide.createIcons({ root: toggleBtn });
            });
        }

        // Handle Login
        document.getElementById('form-login').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login'); 
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Memproses...'; 
            btn.disabled = true; 
            lucide.createIcons({ root: btn });

            try {
                const res = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        action: 'login', 
                        email: document.getElementById('email').value, 
                        password: document.getElementById('pass').value 
                    })
                });
                const r = await res.json();
                
                if(r.status === 'success') {
                    sessionStorage.setItem('user_email', r.data.email);
                    sessionStorage.setItem('user_nama', r.data.nama);
                    sessionStorage.setItem('user_id', r.data.id);

                    showToast("Login Berhasil! Mengalihkan...", "success");
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else { 
                    showToast(r.message, "error"); 
                    btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons({ root: btn });
                }
            } catch (err) { 
                showToast('Terjadi kesalahan koneksi!', 'error'); 
                btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons({ root: btn });
            }
        };

        // Handle Forgot Password
        document.getElementById('form-forgot').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-forgot');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Mengirim...'; 
            btn.disabled = true; 
            lucide.createIcons({ root: btn });

            try {
                const res = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'forgot_password', email: document.getElementById('email-forgot').value })
                });
                const r = await res.json();
                
                if(r.status === 'success') {
                    showToast("Instruksi telah dikirim ke email Anda.", "success");
                    document.getElementById('modal-forgot').classList.add('hidden');
                    document.getElementById('email-forgot').value = '';
                } else {
                    showToast(r.message, "error");
                }
            } catch (err) {
                showToast('Terjadi kesalahan koneksi!', 'error');
            } finally {
                btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons({ root: btn });
            }
        };
    </script>
</body>
</html>
