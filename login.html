<!DOCTYPE html>
<html lang="id" class="transition-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Member - Solvin Digital</title>
    
    <!-- Config & Theme -->
    <script src="config.js?v=2026_1"></script>
    <script src="theme.js"></script>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        if (window.tailwindConfig) {
            tailwind.config = window.tailwindConfig;
        }

        if(sessionStorage.getItem('user_email')) window.location.href = 'dashboard.html';

        (function() {
            const CACHE_KEY = 'cepat_global_settings';
            window.applyGlobalSettings = function(data) {
                if(data.site_favicon) {
                    let link = document.querySelector("link[rel~='icon']");
                    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
                    link.href = data.site_favicon;
                }
                if(data.site_name) {
                    document.title = `Login Member - ${data.site_name}`;
                    document.querySelectorAll('.dyn-site-name').forEach(el => { el.innerText = data.site_name; });
                }
                if(data.site_logo) {
                    const img = document.getElementById('dyn-site-logo');
                    if (img) { img.src = data.site_logo; img.classList.remove('hidden'); }
                    const fb = document.getElementById('logo-fallback');
                    if (fb) fb.classList.add('hidden');
                }
            }
            const cachedStr = localStorage.getItem(CACHE_KEY);
            try { 
                const cached = JSON.parse(cachedStr); 
                if (cached && cached.data) applyGlobalSettings(cached.data);
            } catch(e){}
        })();
    </script>

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        .bg-mesh {
            background-color: #ffffff;
            background-image: radial-gradient(at 0% 0%, rgba(255, 115, 117, 0.15) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(255, 115, 117, 0.15) 0px, transparent 50%);
        }
        .dark .bg-mesh {
            background-color: #0f172a;
            background-image: radial-gradient(at 0% 0%, rgba(255, 115, 117, 0.1) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(255, 115, 117, 0.05) 0px, transparent 50%);
        }
    </style>
</head>
<body class="bg-mesh text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-6">

    <div id="toast-container" class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <main class="w-full max-w-lg animate-fade-in">
        <!-- Brand -->
        <div class="mb-12 text-center space-y-4">
            <div class="inline-flex items-center gap-3">
                <div id="logo-fallback" class="w-14 h-14 bg-primary rounded-2xl flex items-center justify-center text-white shadow-lg rotate-3">
                    <i data-lucide="zap" class="w-8 h-8 fill-current"></i>
                </div>
                <img id="dyn-site-logo" src="" alt="Logo" class="h-12 w-auto hidden">
                <span class="text-3xl font-black tracking-tight dyn-site-name">Solvin Digital</span>
            </div>
            <h1 class="text-2xl font-black text-slate-900 dark:text-white">Selamat Datang Kembali!</h1>
            <p class="text-slate-500 dark:text-slate-400 font-medium">Masuk untuk mengakses dashboard dan materi Anda.</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-[3rem] p-10 shadow-2xl">
            <form id="form-login" class="space-y-8">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Alamat Email</label>
                    <div class="relative group">
                        <i data-lucide="mail" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-primary transition-colors"></i>
                        <input type="email" id="email" class="w-full pl-14 pr-5 py-5 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-3xl outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all font-bold" placeholder="nama@email.com" required>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex items-center justify-between px-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Password</label>
                        <button type="button" onclick="showForgotModal()" class="text-[10px] font-black text-primary hover:opacity-80 uppercase tracking-widest">Lupa Password?</button>
                    </div>
                    <div class="relative group">
                        <i data-lucide="lock" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-primary transition-colors"></i>
                        <input type="password" id="pass" class="w-full pl-14 pr-14 py-5 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-3xl outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all font-bold" placeholder="••••••••" required>
                        <button type="button" id="toggle-pass" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 p-2">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="btn-login" class="w-full bg-primary text-white py-5 rounded-3xl font-black uppercase tracking-widest text-xs shadow-primary hover:scale-[1.02] transition-transform flex items-center justify-center gap-3">
                    Masuk Sekarang <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>

            <div class="mt-10 pt-10 border-t border-slate-100 dark:border-slate-800 text-center">
                <a href="index.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-primary text-xs font-black transition-colors uppercase tracking-widest">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali ke Beranda
                </a>
            </div>
        </div>

        <p class="text-center mt-12 text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
            &copy; 2026 <span class="dyn-site-name">Solvin Digital</span>. All Rights Reserved.
        </p>
    </main>

    <!-- Forgot Password Modal -->
    <div id="modal-forgot" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-md hidden p-6">
        <div class="glass-card w-full max-w-md rounded-[3rem] p-10 relative animate-fade-in shadow-2xl">
            <button onclick="hideForgotModal()" class="absolute top-8 right-8 text-slate-400 hover:text-primary">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            
            <div class="mb-8 space-y-2">
                <h3 class="text-2xl font-black text-slate-900 dark:text-white">Lupa Password?</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">Masukkan email Anda untuk menerima instruksi pemulihan.</p>
            </div>
            
            <form id="form-forgot" class="space-y-6">
                <div class="relative group">
                    <i data-lucide="mail" class="absolute left-5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-primary transition-colors"></i>
                    <input type="email" id="email-forgot" class="w-full pl-14 pr-5 py-5 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-3xl outline-none focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all font-bold" placeholder="email@anda.com" required>
                </div>
                
                <button type="submit" id="btn-forgot" class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 py-5 rounded-3xl font-black uppercase tracking-widest text-xs transition-transform hover:scale-[1.02]">
                    Kirim Instruksi
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `glass px-6 py-4 rounded-2xl font-bold text-sm shadow-2xl transition-all duration-300 translate-y-8 opacity-0 flex items-center gap-3 ${type === 'success' ? 'text-emerald-500 border-emerald-500/20' : 'text-red-500 border-red-500/20'}`;
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i> <span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons({ root: toast });
            setTimeout(() => toast.classList.remove('translate-y-8', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-8', 'opacity-0');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        const toggleBtn = document.getElementById('toggle-pass');
        toggleBtn.onclick = () => {
            const input = document.getElementById('pass');
            const isPw = input.type === 'password';
            input.type = isPw ? 'text' : 'password';
            toggleBtn.innerHTML = `<i data-lucide="${isPw ? 'eye-off' : 'eye'}" class="w-5 h-5"></i>`;
            lucide.createIcons({ root: toggleBtn });
        };

        function showForgotModal() { document.getElementById('modal-forgot').classList.remove('hidden'); }
        function hideForgotModal() { document.getElementById('modal-forgot').classList.add('hidden'); }

        document.getElementById('form-login').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const ori = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin"></i>';
            btn.disabled = true;
            lucide.createIcons();

            try {
                const res = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        action: 'login', 
                        email: document.getElementById('email').value, 
                        password: document.getElementById('pass').value 
                    })
                });
                const r = await res.json();
                if(r.status === 'success') {
                    sessionStorage.setItem('user_email', r.data.email);
                    sessionStorage.setItem('user_nama', r.data.nama);
                    showToast("Login Berhasil! Mengalihkan...");
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    showToast(r.message, 'error');
                    btn.innerHTML = ori; btn.disabled = false; lucide.createIcons();
                }
            } catch (err) {
                showToast("Kesalahan koneksi.", 'error');
                btn.innerHTML = ori; btn.disabled = false; lucide.createIcons();
            }
        };
    </script>
</body>
</html>
