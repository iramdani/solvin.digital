<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    
    <!-- Config & Theme -->
    <script src="config.js?v=2026_1"></script>
    <script src="theme.js"></script>
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        if (window.tailwindConfig) {
            tailwind.config = window.tailwindConfig;
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { @apply bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-slate-200/50 dark:border-slate-800/50 shadow-soft; }
        
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <!-- Decorative Elements -->
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] -mr-48 -mt-48 animate-pulse"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] -ml-48 -mb-48 animate-pulse" style="animation-delay: 2s"></div>

    <main class="w-full max-w-lg text-center space-y-8 animate-fade-in">
        
        <!-- Illustration -->
        <div class="relative inline-block">
            <div class="absolute inset-0 bg-primary/20 rounded-full blur-3xl scale-150 animate-pulse"></div>
            <div class="relative animate-float">
                <span class="text-[150px] font-black text-primary opacity-20">404</span>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-32 h-32 bg-white dark:bg-darkCard rounded-[2.5rem] shadow-2xl flex items-center justify-center border-2 border-primary/20">
                        <i data-lucide="search-x" class="w-16 h-16 text-primary"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Halaman Tidak Ditemukan</h1>
            <p class="text-slate-500 dark:text-slate-400 font-medium leading-relaxed max-w-sm mx-auto">
                Maaf, halaman yang Anda cari tidak tersedia atau telah dipindahkan ke alamat lain.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <a href="index.html" class="w-full sm:w-auto bg-primary hover:bg-primary/90 text-white px-8 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-xl shadow-primary/20 transition-all flex items-center justify-center gap-2">
                <i data-lucide="home" class="w-4 h-4"></i> Kembali ke Beranda
            </a>
            <a href="javascript:history.back()" class="w-full sm:w-auto bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-700 px-8 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-slate-50 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Halaman Sebelumnya
            </a>
        </div>

        <!-- Footer -->
        <p class="pt-12 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.3em]">
            &copy; 2026 <span class="dyn-site-name">Solvin Digital</span>. All Rights Reserved.
        </p>

    </main>

    <script>
        lucide.createIcons();
        
        // Global Settings Injection (Legacy Support)
        (function() {
            const CACHE_KEY = 'cepat_global_settings';
            window.applyGlobalSettings = function(data) {
                if(data.site_favicon) {
                    let link = document.querySelector("link[rel~='icon']");
                    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
                    link.href = data.site_favicon;
                }
                if(data.site_name) {
                    document.querySelectorAll('.dyn-site-name').forEach(el => { el.innerText = data.site_name; });
                }
            }
            const cachedStr = localStorage.getItem(CACHE_KEY);
            try { 
                const cached = JSON.parse(cachedStr); 
                if (cached && cached.data) applyGlobalSettings(cached.data);
            } catch(e){}
        })();
    </script>
</body>
</html>
